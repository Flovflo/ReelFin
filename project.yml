name: ReelFin
options:
  bundleIdPrefix: com.reelfin
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
    TARGETED_DEVICE_FAMILY: "1,2"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.29.3
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    from: 8.55.1
targets:
  ReelFinApp:
    type: application
    platform: iOS
    sources:
      - path: ReelFinApp/App
      - path: ReelFinApp/Resources
        buildPhase: resources
    dependencies:
      - target: ReelFinUI
      - target: Shared
      - target: SyncEngine
      - target: JellyfinAPI
      - target: DataStore
      - target: ImageCache
      - target: PlaybackEngine
      - package: Sentry
        product: Sentry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.app
        PRODUCT_NAME: ReelFin
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_CFBundleDisplayName: ReelFin
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.entertainment
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_REELFIN_PRIVACY_POLICY_URL: https://github.com/Flovflo/ReelFin/blob/main/Docs/privacy-policy.html
        INFOPLIST_KEY_REELFIN_TERMS_OF_SERVICE_URL: https://github.com/Flovflo/ReelFin/blob/main/Docs/terms-of-service.html
        INFOPLIST_KEY_REELFIN_SUPPORT_URL: https://github.com/Flovflo/ReelFin/blob/main/Docs/support.html
        INFOPLIST_KEY_REELFIN_SUPPORT_EMAIL: floriantaffin@gmail.com
        INFOPLIST_KEY_REELFIN_SENTRY_DSN: $(REELFIN_SENTRY_DSN)
        REELFIN_SENTRY_DSN: ""
  Shared:
    type: framework
    platform: iOS
    sources:
      - path: Shared/Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.shared
  JellyfinAPI:
    type: framework
    platform: iOS
    sources:
      - path: JellyfinAPI/Sources/JellyfinAPI
    dependencies:
      - target: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.jellyfinapi
  DataStore:
    type: framework
    platform: iOS
    sources:
      - path: DataStore/Sources/DataStore
    dependencies:
      - target: Shared
      - target: JellyfinAPI
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.datastore
  ImageCache:
    type: framework
    platform: iOS
    sources:
      - path: ImageCache/Sources/ImageCache
    dependencies:
      - target: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.imagecache
  SyncEngine:
    type: framework
    platform: iOS
    sources:
      - path: SyncEngine/Sources/SyncEngine
    dependencies:
      - target: Shared
      - target: JellyfinAPI
      - target: DataStore
      - target: ImageCache
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.sync
  PlaybackEngine:
    type: framework
    platform: iOS
    sources:
      - path: PlaybackEngine/Sources/PlaybackEngine
      - path: PlaybackEngine/Sources/PlaybackEngine/NativeBridge/EBMLParser.swift
      - path: PlaybackEngine/Sources/PlaybackEngine/NativeBridge/MP4BoxWriter.swift
    dependencies:
      - target: Shared
      - target: JellyfinAPI
      - target: DataStore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.playback
  ReelFinUI:
    type: framework
    platform: iOS
    sources:
      - path: ReelFinUI/Sources/ReelFinUI
    dependencies:
      - target: Shared
      - target: JellyfinAPI
      - target: DataStore
      - target: ImageCache
      - target: SyncEngine
      - target: PlaybackEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.ui
  ReelFinWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.widgets
        INFOPLIST_KEY_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        INFOPLIST_KEY_CFBundleDisplayName: ReelFin Widgets
    dependencies:
      - target: Shared
      - target: PlaybackEngine
      - target: JellyfinAPI
      - target: DataStore
  JellyfinAPITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/JellyfinAPITests
    dependencies:
      - target: JellyfinAPI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.jellyfinapi.tests
  PlaybackEngineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/PlaybackEngineTests
    dependencies:
      - target: PlaybackEngine
      - target: JellyfinAPI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.playback.tests
  ImageCacheTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/ImageCacheTests
    dependencies:
      - target: ImageCache
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.imagecache.tests
  ReelFinUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/ReelFinUITests
    dependencies:
      - target: ReelFinApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.ui.tests
        TEST_TARGET_NAME: ReelFinApp
schemes:
  ReelFin:
    build:
      targets:
        ReelFinApp: all
        ReelFinWidgetsExtension: all
    test:
      targets:
        - PlaybackEngineTests
        - ImageCacheTests
        - JellyfinAPITests
        - ReelFinUITests
