name: ReelFin
options:
  bundleIdPrefix: com.reelfin
  deploymentTarget:
    iOS: "26.0"
    tvOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
    TARGETED_DEVICE_FAMILY: "1,2"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.29.3
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    from: 8.55.1
targets:
  # ──────────────────────────────────────────────
  # iOS Application
  # ──────────────────────────────────────────────
  ReelFinApp:
    type: application
    platform: iOS
    sources:
      - path: ReelFinApp/App
      - path: ReelFinApp/Resources
        buildPhase: resources
    dependencies:
      - target: ReelFinUI
      - target: Shared
      - target: SyncEngine
      - target: JellyfinAPI
      - target: DataStore
      - target: ImageCache
      - target: PlaybackEngine
      - package: Sentry
        product: Sentry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.app
        PRODUCT_NAME: ReelFin
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_CFBundleDisplayName: ReelFin
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.entertainment
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_REELFIN_PRIVACY_POLICY_URL: https://github.com/Flovflo/ReelFin/blob/main/Docs/privacy-policy.html
        INFOPLIST_KEY_REELFIN_TERMS_OF_SERVICE_URL: https://github.com/Flovflo/ReelFin/blob/main/Docs/terms-of-service.html
        INFOPLIST_KEY_REELFIN_SUPPORT_URL: https://github.com/Flovflo/ReelFin/blob/main/Docs/support.html
        INFOPLIST_KEY_REELFIN_SUPPORT_EMAIL: floriantaffin@gmail.com
        INFOPLIST_KEY_REELFIN_SENTRY_DSN: $(REELFIN_SENTRY_DSN)
        REELFIN_SENTRY_DSN: ""

  # ──────────────────────────────────────────────
  # iOS Frameworks
  # ──────────────────────────────────────────────
  Shared:
    type: framework
    platform: iOS
    sources:
      - path: Shared/Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.shared
  JellyfinAPI:
    type: framework
    platform: iOS
    sources:
      - path: JellyfinAPI/Sources/JellyfinAPI
    dependencies:
      - target: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.jellyfinapi
  DataStore:
    type: framework
    platform: iOS
    sources:
      - path: DataStore/Sources/DataStore
    dependencies:
      - target: Shared
      - target: JellyfinAPI
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.datastore
  ImageCache:
    type: framework
    platform: iOS
    sources:
      - path: ImageCache/Sources/ImageCache
    dependencies:
      - target: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.imagecache
  SyncEngine:
    type: framework
    platform: iOS
    sources:
      - path: SyncEngine/Sources/SyncEngine
    dependencies:
      - target: Shared
      - target: JellyfinAPI
      - target: DataStore
      - target: ImageCache
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.sync
  PlaybackEngine:
    type: framework
    platform: iOS
    sources:
      - path: PlaybackEngine/Sources/PlaybackEngine
      - path: PlaybackEngine/Sources/PlaybackEngine/NativeBridge/EBMLParser.swift
      - path: PlaybackEngine/Sources/PlaybackEngine/NativeBridge/MP4BoxWriter.swift
    dependencies:
      - target: Shared
      - target: JellyfinAPI
      - target: DataStore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.playback
  ReelFinUI:
    type: framework
    platform: iOS
    sources:
      - path: ReelFinUI/Sources/ReelFinUI
    dependencies:
      - target: Shared
      - target: JellyfinAPI
      - target: DataStore
      - target: ImageCache
      - target: SyncEngine
      - target: PlaybackEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.ui

  # ──────────────────────────────────────────────
  # tvOS Application
  # ──────────────────────────────────────────────
  ReelFinTVApp:
    type: application
    platform: tvOS
    deploymentTarget: "26.0"
    sources:
      - path: ReelFinApp/AppTV
      - path: ReelFinApp/App/ErrorTracking.swift
    dependencies:
      - target: ReelFinUITV
      - target: SharedTV
      - target: SyncEngineTV
      - target: JellyfinAPITV
      - target: DataStoreTV
      - target: ImageCacheTV
      - target: PlaybackEngineTV
      - package: Sentry
        product: Sentry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.tv
        PRODUCT_NAME: ReelFin
        TVOS_DEPLOYMENT_TARGET: 26.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: ReelFin
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.entertainment
        INFOPLIST_KEY_REELFIN_SENTRY_DSN: $(REELFIN_SENTRY_DSN)
        REELFIN_SENTRY_DSN: ""

  # ──────────────────────────────────────────────
  # tvOS Frameworks (mirror of iOS, platform: tvOS)
  # ──────────────────────────────────────────────
  SharedTV:
    type: framework
    platform: tvOS
    deploymentTarget: "26.0"
    sources:
      - path: Shared/Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.shared.tv
        PRODUCT_NAME: Shared
  JellyfinAPITV:
    type: framework
    platform: tvOS
    deploymentTarget: "26.0"
    sources:
      - path: JellyfinAPI/Sources/JellyfinAPI
    dependencies:
      - target: SharedTV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.jellyfinapi.tv
        PRODUCT_NAME: JellyfinAPI
  DataStoreTV:
    type: framework
    platform: tvOS
    deploymentTarget: "26.0"
    sources:
      - path: DataStore/Sources/DataStore
    dependencies:
      - target: SharedTV
      - target: JellyfinAPITV
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.datastore.tv
        PRODUCT_NAME: DataStore
  ImageCacheTV:
    type: framework
    platform: tvOS
    deploymentTarget: "26.0"
    sources:
      - path: ImageCache/Sources/ImageCache
    dependencies:
      - target: SharedTV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.imagecache.tv
        PRODUCT_NAME: ImageCache
  SyncEngineTV:
    type: framework
    platform: tvOS
    deploymentTarget: "26.0"
    sources:
      - path: SyncEngine/Sources/SyncEngine
    dependencies:
      - target: SharedTV
      - target: JellyfinAPITV
      - target: DataStoreTV
      - target: ImageCacheTV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.sync.tv
        PRODUCT_NAME: SyncEngine
  PlaybackEngineTV:
    type: framework
    platform: tvOS
    deploymentTarget: "26.0"
    sources:
      - path: PlaybackEngine/Sources/PlaybackEngine
      - path: PlaybackEngine/Sources/PlaybackEngine/NativeBridge/EBMLParser.swift
      - path: PlaybackEngine/Sources/PlaybackEngine/NativeBridge/MP4BoxWriter.swift
    dependencies:
      - target: SharedTV
      - target: JellyfinAPITV
      - target: DataStoreTV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.playback.tv
        PRODUCT_NAME: PlaybackEngine
  ReelFinUITV:
    type: framework
    platform: tvOS
    deploymentTarget: "26.0"
    sources:
      - path: ReelFinUI/Sources/ReelFinUI
    dependencies:
      - target: SharedTV
      - target: JellyfinAPITV
      - target: DataStoreTV
      - target: ImageCacheTV
      - target: SyncEngineTV
      - target: PlaybackEngineTV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.ui.tv
        PRODUCT_NAME: ReelFinUI

  # ──────────────────────────────────────────────
  # Widgets & Extensions
  # ──────────────────────────────────────────────
  ReelFinWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.widgets
        INFOPLIST_KEY_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        INFOPLIST_KEY_CFBundleDisplayName: ReelFin Widgets
    dependencies:
      - target: Shared
      - target: PlaybackEngine
      - target: JellyfinAPI
      - target: DataStore

  # ──────────────────────────────────────────────
  # Tests (iOS)
  # ──────────────────────────────────────────────
  JellyfinAPITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/JellyfinAPITests
    dependencies:
      - target: JellyfinAPI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.jellyfinapi.tests
  PlaybackEngineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/PlaybackEngineTests
    dependencies:
      - target: PlaybackEngine
      - target: JellyfinAPI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.playback.tests
  ImageCacheTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/ImageCacheTests
    dependencies:
      - target: ImageCache
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.imagecache.tests
  ReelFinUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/ReelFinUITests
    dependencies:
      - target: ReelFinApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reelfin.ui.tests
        TEST_TARGET_NAME: ReelFinApp
schemes:
  ReelFin:
    build:
      targets:
        ReelFinApp: all
        ReelFinWidgetsExtension: all
    test:
      targets:
        - PlaybackEngineTests
        - ImageCacheTests
        - JellyfinAPITests
        - ReelFinUITests
  ReelFinTV:
    build:
      targets:
        ReelFinTVApp: all
    test:
      targets:
        - PlaybackEngineTests
        - ImageCacheTests
        - JellyfinAPITests
